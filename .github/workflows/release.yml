name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          mkdir -p /tmp/wp-rest-importer
          rsync -av --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='CONTRIBUTING.md' \
            ./ /tmp/wp-rest-importer/wp-rest-importer/
          cd /tmp/wp-rest-importer
          zip -r wp-rest-importer.zip wp-rest-importer/
          mv wp-rest-importer.zip $GITHUB_WORKSPACE/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WP REST Importer v${{ steps.version.outputs.version }}
          body: |
            ## WP REST Importer v${{ steps.version.outputs.version }}

            Import posts, pages, media, categories, tags and authors
            from any public WordPress site via REST API.

            ### Installation
            1. Download `wp-rest-importer.zip` below
            2. Upload via Plugins > Add New > Upload Plugin
            3. Activate and go to Tools > WP REST Importer

            ### Links
            - [Documentation](https://github.com/fysalyaqoob/wp-rest-importer#readme)
            - [Support](https://github.com/fysalyaqoob/wp-rest-importer/issues)
            - [Author](https://fysalyaqoob.com)

            **Full Changelog:** https://github.com/fysalyaqoob/wp-rest-importer/commits/main
          files: wp-rest-importer.zip
          make_latest: true
