name: Daily Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes since last tag
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git diff --name-only $LAST_TAG HEAD -- \
              '*.php' '*.js' '*.css' 'README.md' 'CHANGELOG.md')
            if [ -z "$CHANGES" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No changes since $LAST_TAG — skipping release"
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Get current version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          CURRENT=$(grep -oP "(?<=Version:\s{5})\d+\.\d+\.\d+" \
            wp-rest-importer.php)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW"

      - name: Bump version in plugin file
        if: steps.changes.outputs.changed == 'true'
        run: |
          sed -i "s/Version:     ${{ steps.version.outputs.current }}/Version:     ${{ steps.version.outputs.new }}/" \
            wp-rest-importer.php

      - name: Commit version bump
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wp-rest-importer.php
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Create tag
        if: steps.changes.outputs.changed == 'true'
        run: |
          git tag v${{ steps.version.outputs.new }}
          git push origin v${{ steps.version.outputs.new }}

      - name: Create plugin zip
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p /tmp/wp-rest-importer
          rsync -av --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.log' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='CONTRIBUTING.md' \
            ./ /tmp/wp-rest-importer/wp-rest-importer/
          cd /tmp/wp-rest-importer
          zip -r wp-rest-importer.zip wp-rest-importer/
          mv wp-rest-importer.zip $GITHUB_WORKSPACE/

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: WP REST Importer v${{ steps.version.outputs.new }}
          body: |
            ## WP REST Importer v${{ steps.version.outputs.new }}

            Import posts, pages, media, categories, tags and authors
            from any public WordPress site via REST API.

            ### Installation
            1. Download `wp-rest-importer.zip` below
            2. Upload via Plugins > Add New > Upload Plugin
            3. Activate and go to Tools > WP REST Importer

            ### Links
            - [Documentation](https://github.com/fysalyaqoob/wp-rest-importer#readme)
            - [Support](https://github.com/fysalyaqoob/wp-rest-importer/issues)
            - [Author](https://fysalyaqoob.com)

            **Full Changelog:** https://github.com/fysalyaqoob/wp-rest-importer/commits/main
          files: wp-rest-importer.zip
          make_latest: true
