name: PHP Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Lint all PHP files
        run: |
          ERROR=0
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" | while read FILE; do
            php -l "$FILE"
            if [ $? -ne 0 ]; then
              ERROR=1
            fi
          done
          if [ $ERROR -ne 0 ]; then
            echo "PHP lint errors found"
            exit 1
          fi
          echo "All PHP files passed lint check"
